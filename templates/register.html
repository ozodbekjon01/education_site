<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">

    <!-- MOBILE uchun -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Ro‘yxatdan o‘tish | Ta'lim platformasi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
body{
    background: linear-gradient(135deg, #0f111a 0%, #1c1f2a 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color: #e5e7eb; /* yozuvlar oq bo'ladi */
    font-family: 'Inter', sans-serif;
}

.register-card{
    background: rgba(31, 35, 51, 0.95); /* qorong‘i card fon */
    border-radius:12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    color: #e5e7eb; /* card ichidagi yozuvlar oq */
}

h4{
    font-weight:700;
    color: #facc15; /* sariq sarlavha */
}

label.form-label{
    color: #e5e7eb; /* label ham oq bo'lsin */
}

input.form-control{
    height:45px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    color: #e5e7eb; /* input yozuvlar oq */
}

input.form-control::placeholder{
    color: rgba(229, 231, 235, 0.6); /* placeholder biroz ochroq */
}

input.form-control:focus{
    background: rgba(255,255,255,0.1);
    border-color: #3b82f6;
    color: #ffffff;
    box-shadow: 0 0 8px rgba(59,130,246,0.5);
}

button.btn-success{
    height:45px;
    font-weight:600;
    background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
    border: none;
    transition: all 0.3s ease;
    color: #ffffff; /* button yozuvi oq */
}

button.btn-success:hover{
    background: linear-gradient(135deg, #22c55e 0%, #059669 100%);
}

a{
    color: #3b82f6;
    text-decoration: none;
    transition: all 0.2s;
}

a:hover{
    color: #facc15;
}

.alert-danger{
    background: rgba(220, 38, 38, 0.2);
    color: #f87171;
    border: none;
}
</style>

</head>

<body>

<div class="container px-3">
    <div class="row justify-content-center">

        <div class="col-12 col-sm-9 col-md-6 col-lg-5">

            <div class="card shadow register-card">
                <div class="card-body p-4">

                    <h4 class="text-center mb-4">
                        Ro‘yxatdan o‘tish
                    </h4>

                    {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">To‘liq ism</label>
                            <input type="text" name="full_name" class="form-control" required>
                        </div>

                        <div class="mb-3" style="display:none;">
                            <label class="form-label">Tel raqam</label>
                            <input type="tel" name="number" class="form-control" placeholder="+998...">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Login</label>
                            <input type="text" name="login" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Parol</label>
                            <input type="password" name="password" class="form-control" minlength="6" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Parolni qayta kiriting</label>
                            <input type="password" name="password2" class="form-control" minlength="6" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Ro‘yxatdan o‘tish
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/login">
                            Kirish sahifasiga qaytish
                        </a>
                    </div>

                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
