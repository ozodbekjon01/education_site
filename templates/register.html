<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">

    <!-- MOBILE uchun -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Ro‘yxatdan o‘tish | Ta'lim platformasi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg, #0f111a 0%, #2a2323 100%);

            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .register-card{
            background: rgba(152, 167, 255, 0.5);

            border-radius:12px;
        }

        input{
            height:45px;
        }

        button{
            height:45px;
            font-weight:500;
        }

        h4{
            font-weight:600;
        }
    </style>

</head>

<body class="bg-light">

<div class="container px-3">
    <div class="row justify-content-center">

        <!-- Mobil uchun mos -->
        <div class="col-12 col-sm-9 col-md-6 col-lg-5">

            <div class="card shadow register-card">
                <div class="card-body p-4">

                    <h4 class="text-center mb-4">
                        Ro‘yxatdan o‘tish
                    </h4>

                    {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">To‘liq ism</label>
                            <input type="text" name="full_name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tel raqam</label>
                            <input type="tel" name="number" class="form-control" placeholder="+998..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Login</label>
                            <input type="text" name="login" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Parol</label>
                            <input type="password" name="password" class="form-control" minlength="6" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Parolni qayta kiriting</label>
                            <input type="password" name="password2" class="form-control" minlength="6" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Ro‘yxatdan o‘tish
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/login">
                            Kirish sahifasiga qaytish
                        </a>
                    </div>

                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
