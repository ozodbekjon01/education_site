<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">

    <!-- MOBILE uchun MUHIM -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Kirish | Ta'lim platformasi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg, #0f111a 0%, #1c1f2a 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color: #e5e7eb; /* umumiy yozuvlar oq */
    font-family: 'Inter', sans-serif;
}

.login-card{
    background: rgba(31, 35, 51, 0.95); /* qorong‘i card */
    border-radius:12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    color: #e5e7eb; /* card ichidagi yozuvlar oq */
}

.login-title{
    font-weight:700;
    color: #facc15; /* sariq sarlavha */
}

label.form-label{
    color: #e5e7eb; /* label yozuvlar oq */
}

input.form-control{
    height:45px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    color: #e5e7eb; /* input yozuv oq */
}

input.form-control::placeholder{
    color: rgba(229,231,235,0.6); /* placeholder biroz ochroq */
}

input.form-control:focus{
    background: rgba(255,255,255,0.1);
    border-color: #3b82f6;
    color: #ffffff;
    box-shadow: 0 0 8px rgba(59,130,246,0.5);
}

button.btn-primary{
    height:45px;
    font-weight:600;
    background: linear-gradient(135deg, #677de9 0%, #905ecb 100%);
    border: none;
    color: #ffffff;
    transition: all 0.3s ease;
}

button.btn-primary:hover{
    background: linear-gradient(135deg, #4f63d2 0%, #7a3fb2 100%);
}

a{
    color: #3b82f6;
    text-decoration: none;
    transition: all 0.2s;
}

a:hover{
    color: #facc15;
}

.alert-danger{
    background: rgba(220, 38, 38, 0.2);
    color: #f87171;
    border: none;
}
</style>

</head>

<body>

<div class="container px-3">
    <div class="row justify-content-center">

        <div class="col-12 col-sm-8 col-md-5 col-lg-4">

            <div class="card shadow login-card">
                <div class="card-body p-4">

                    <h4 class="text-center mb-4 login-title">
                        Tizimga kirish
                    </h4>

                    {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Login</label>
                            <input type="text" name="login" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Parol</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <input type="hidden" name="next" value="{{ next }}">
                        <button type="submit" class="btn btn-primary w-100">
                            Kirish
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/register">
                            Ro‘yxatdan o‘tish
                        </a>
                    </div>

                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
